<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Symphony - Your Feelings as Music</title>
    <meta name="description" content="Transform your daily emotions into beautiful, unique melodies. Create your personal soundtrack of the year.">
    
    <!-- Open Graph / Social Media Tags -->
    <meta property="og:title" content="Emotion Symphony">
    <meta property="og:description" content="Your feelings, transformed into music">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://emotion-symphony.vercel.app">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gradient-bg">
        <div class="gradient-sphere"></div>
    </div>

    <main class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-music"></i>
                <h1>Emotion Symphony</h1>
            </div>
            <div class="date-badge">
                <i class="far fa-calendar-alt"></i>
                <span id="currentDate"></span>
            </div>
        </header>

        <!-- Main Visualizer -->
        <div class="visualizer-container">
            <canvas id="visualizer" width="600" height="600"></canvas>
            <div class="visualizer-glow"></div>
            
            <!-- Emotion Indicators -->
            <div class="emotion-indicators">
                <div class="indicator energy-indicator">
                    <span class="label">Energy</span>
                    <div class="indicator-bar">
                        <div class="indicator-fill" id="energyFill"></div>
                    </div>
                </div>
                <div class="indicator happiness-indicator">
                    <span class="label">Happiness</span>
                    <div class="indicator-bar">
                        <div class="indicator-fill" id="happinessFill"></div>
                    </div>
                </div>
                <div class="indicator calmness-indicator">
                    <span class="label">Calmness</span>
                    <div class="indicator-bar">
                        <div class="indicator-fill" id="calmnessFill"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <h2 class="panel-title">How do you feel today?</h2>
            
            <div class="slider-group">
                <!-- Energy Slider -->
                <div class="slider-container">
                    <div class="slider-header">
                        <span class="slider-label">
                            <i class="fas fa-bolt"></i> Energy
                        </span>
                        <span class="slider-value" id="energyValue">50%</span>
                    </div>
                    <div class="slider-wrapper">
                        <span class="slider-min">Low</span>
                        <input type="range" id="energy" class="slider energy-slider" min="0" max="100" value="50" step="1">
                        <span class="slider-max">High</span>
                    </div>
                </div>

                <!-- Happiness Slider -->
                <div class="slider-container">
                    <div class="slider-header">
                        <span class="slider-label">
                            <i class="far fa-smile"></i> Happiness
                        </span>
                        <span class="slider-value" id="happinessValue">50%</span>
                    </div>
                    <div class="slider-wrapper">
                        <span class="slider-min">Sad</span>
                        <input type="range" id="happiness" class="slider happiness-slider" min="0" max="100" value="50" step="1">
                        <span class="slider-max">Joyful</span>
                    </div>
                </div>

                <!-- Calmness Slider -->
                <div class="slider-container">
                    <div class="slider-header">
                        <span class="slider-label">
                            <i class="fas fa-water"></i> Calmness
                        </span>
                        <span class="slider-value" id="calmnessValue">50%</span>
                    </div>
                    <div class="slider-wrapper">
                        <span class="slider-min">Tense</span>
                        <input type="range" id="calmness" class="slider calmness-slider" min="0" max="100" value="50" step="1">
                        <span class="slider-max">Peaceful</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="playButton" class="btn btn-primary">
                    <i class="fas fa-play"></i> Play My Emotion
                </button>
                <button id="stopButton" class="btn btn-secondary">
                    <i class="fas fa-stop"></i> Stop
                </button>
                <button id="saveButton" class="btn btn-accent">
                    <i class="far fa-bookmark"></i> Save Today
                </button>
            </div>

            <!-- Today's Composition -->
            <div id="compositionDisplay" class="composition-display hidden">
                <h3>Today's Melody</h3>
                <div class="note-sequence" id="noteSequence"></div>
            </div>
        </div>

        <!-- History Timeline -->
        <section class="history-section">
            <h2 class="section-title">
                <i class="fas fa-history"></i> Your Emotional Journey
            </h2>
            <div class="timeline" id="timeline"></div>
        </section>

        <!-- Share Modal (Hidden by default) -->
        <div id="shareModal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>Share Your Emotion</h3>
                <p>Your emotional fingerprint for today:</p>
                <div class="emotional-fingerprint" id="emotionalFingerprint"></div>
                <button class="btn btn-primary" id="copyShareLink">
                    <i class="fas fa-link"></i> Copy Share Link
                </button>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="script.js"></script>
</body>
</html>
